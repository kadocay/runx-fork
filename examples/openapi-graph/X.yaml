skill: openapi-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: openapi-get-pet
      runner: main
      inputs:
        operation_id: getPet
        petId: p-42
        fields: name
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    inputs:
      operation_id:
        type: string
        required: true
        description: The OpenAPI operationId to invoke.
      petId:
        type: string
        required: false
        description: Path parameter for the getPet operation.
      fields:
        type: string
        required: false
        description: Optional query parameter.
    graph:
      name: openapi-graph
      steps:
        - id: call
          skill: ../openapi-tool
          inputs:
            operation_id: "$input.operation_id"
            petId: "$input.petId"
            fields: "$input.fields"
