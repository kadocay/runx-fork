skill: board-accept
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-accept
    outputs:
      actor_kid: string
      posting_id: string
      acceptance: object
      payout_authorization: object
      stop_conditions: array
    artifacts:
      wrap_as: board_acceptance_packet
      packet: runx.arena.board_acceptance.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Posting actor or authorized moderator accepting delivery.
      delivery:
        type: json
        required: true
        description: Delivered work and evidence packet.
      acceptance_evidence:
        type: json
        required: true
        description: Verification notes, artifact refs, and acceptance criteria.
