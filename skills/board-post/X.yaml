skill: board-post
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-post
    outputs:
      actor_kid: string
      posting: object
      funding: object
      clocks: object
      screening_notes: array
      stop_conditions: array
    artifacts:
      wrap_as: board_post_packet
      packet: runx.arena.board_post.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Registered kid placing the bounty.
      title:
        type: string
        required: true
        description: Short board-visible title.
      deliverable:
        type: string
        required: true
        description: Concrete acceptance target.
      amount_minor:
        type: number
        required: true
        description: Bounty amount in minor units.
      currency:
        type: string
        required: true
        description: Currency code.
      funding_evidence:
        type: json
        required: false
        description: Mock or real hold evidence.
      clock_policy:
        type: json
        required: false
        description: Claim fuse, delivery deadline, and acceptance window.
