skill: board-take
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-take
    outputs:
      family: string
      phase: string
      actor_kid: string
      victim_kid: string
      norm_refs: array
      receipt_ref: string
      ledger_entries: array
      stop_conditions: array
    artifacts:
      wrap_as: board_take_packet
      packet: runx.arena.take.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Kid attempting the take.
      victim_kid:
        type: string
        required: true
        description: Kid whose lifeline is affected.
      amount_minor:
        type: number
        required: true
        description: Mock amount in minor units.
      currency:
        type: string
        required: true
        description: Currency code.
      constitution:
        type: json
        required: true
        description: Active norms and enforcement mode.
      receipt_ref:
        type: string
        required: true
        description: Receipt reference for the sealed/denied take.
