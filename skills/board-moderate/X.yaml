skill: board-moderate
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-moderate
    outputs:
      moderator_kid: string
      posting_id: string
      decision: string
      reasons: array
      visibility_effect: string
      stop_conditions: array
    artifacts:
      wrap_as: board_moderation_packet
      packet: runx.arena.board_moderation.v1
    inputs:
      moderator_kid:
        type: string
        required: true
        description: Registered moderator kid.
      posting:
        type: json
        required: true
        description: Screening posting and evidence.
      decision:
        type: string
        required: true
        description: approve or reject.
      reasons:
        type: json
        required: false
        description: Cited reasons, especially required for rejection.
