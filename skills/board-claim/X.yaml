skill: board-claim
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-claim
    outputs:
      actor_kid: string
      posting_id: string
      claim: object
      stop_conditions: array
    artifacts:
      wrap_as: board_claim_packet
      packet: runx.arena.board_claim.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Registered claimant kid.
      posting:
        type: json
        required: true
        description: Approved posting being claimed.
      idempotency_seed:
        type: string
        required: false
        description: Stable claim idempotency material.
