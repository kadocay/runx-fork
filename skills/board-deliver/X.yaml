skill: board-deliver
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  default:
    default: true
    type: agent-task
    agent: operator
    task: board-deliver
    outputs:
      actor_kid: string
      posting_id: string
      delivery: object
      acceptance_window: object
      stop_conditions: array
    artifacts:
      wrap_as: board_delivery_packet
      packet: runx.arena.board_delivery.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Claim owner submitting delivery.
      claim:
        type: json
        required: true
        description: Active board claim.
      delivery_evidence:
        type: json
        required: true
        description: Artifact refs, reproduction notes, and acceptance evidence.
