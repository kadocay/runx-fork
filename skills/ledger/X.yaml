skill: ledger
version: "0.2.0"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
harness:
  cases:
    - name: ledger-read-answers-with-chain-proof
      runner: read
      inputs:
        question: Which spend runs sealed for the ops principal last week, and is that stretch of the chain intact?
        filter:
          principal: principal:ops
          skill_ref: runx/spend
          status:
            - sealed
          time_range:
            from: "2026-06-01T00:00:00Z"
            to: "2026-06-08T00:00:00Z"
        proof:
          verify_chain: true
        receipts:
          - id: rcpt_01HZX5K2spend
            name: runx/spend
            status: sealed
            created_at: "2026-06-03T14:21:08Z"
          - id: rcpt_01HZX9Q7spend
            name: runx/spend
            status: sealed
            created_at: "2026-06-06T09:02:44Z"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: ledger-read-answers-without-proof
      runner: read
      inputs:
        question: Which spend runs sealed for the ops principal?
        filter:
          skill_ref: runx/spend
          status:
            - sealed
        receipts:
          - receipt_id: rcpt_01HZX5K2spend
            skill_ref: runx/spend
            status: sealed
            created_at: "2026-06-03T14:21:08Z"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: ledger-read-no-matches-stops-for-evidence
      runner: read
      inputs:
        question: Which refund runs sealed for the ops principal?
        filter:
          skill_ref: runx/refund
          status:
            - sealed
        receipts:
          - id: rcpt_01HZX5K2spend
            name: runx/spend
            status: sealed
            created_at: "2026-06-03T14:21:08Z"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
runners:
  ledger:
    default: true
    type: agent-task
    agent: analyst
    task: ledger
    outputs:
      ledger_answer: object
      matched_receipts: array
      chain_verification: object
      summary: string
    artifacts:
      wrap_as: ledger_answer_packet
      packet: runx.ledger_answer.v1
    inputs:
      question:
        type: string
        required: true
        description: "The audit question to answer against the receipt ledger."
      filter:
        type: json
        required: false
        description: "Query narrowing: principal, skill_ref, status, and time_range (from/to)."
      proof:
        type: json
        required: false
        description: "Chain-verification request over the matched receipts, e.g. { verify_chain: true }."
  read:
    type: cli-tool
    command: node
    args:
      - run.mjs
    outputs:
      ledger_answer: object
      matched_receipts: array
      chain_verification: object
      summary: string
    artifacts:
      wrap_as: ledger_answer_packet
      packet: runx.ledger_answer.v1
    inputs:
      question:
        type: string
        required: false
        description: "The audit question to answer against the receipt ledger."
      filter:
        type: json
        required: false
        description: "Query narrowing: principal, skill_ref, status, and time_range (from/to)."
      proof:
        type: json
        required: false
        description: "Chain-verification request over the matched receipts, e.g. { verify_chain: true }."
      receipts:
        type: json
        required: false
        description: "Optional explicit ledger rows for replay or controlled evaluation; when present, the reader uses them instead of shelling runx history."
