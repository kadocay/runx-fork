skill: data-store
version: "0.1.2"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  runtime_path: data-adapter

harness:
  cases:
    - name: data-store-append-and-readback-default-sqlite
      runner: append_and_readback
      inputs:
        data_source_ref: local://runx-data-store/default-sqlite-fixture
        resource: board_events
        aggregate_id: default-sqlite-posting-123
        expected_version: 0
        idempotency_key: default-sqlite-posting-123:create:v1
        event:
          type: posting.created
          payload:
            title: verify default sqlite-backed local data source
            actor: runx:principal:example
            amount_minor: 500
            currency: usd
      expect:
        status: sealed
    - name: data-store-append-version-conflict
      runner: append_event
      inputs:
        data_source_ref: local://runx-data-store/version-conflict
        store_id: data-store-version-conflict-v1
        resource: generic_events
        aggregate_id: item-1
        expected_version: 1
        idempotency_key: item-1:create-conflict:v1
        event:
          type: item.created
          payload:
            label: conflict item
      expect:
        status: sealed

policy:
  allow:
    - provider: data-source
      method: READ
      scope: runx:data:read
    - provider: data-source
      method: APPEND
      scope: runx:data:append
  deny:
    - raw_sql_from_model
    - unrestricted_export
    - secret_material
    - pii_without_projection

emits:
  - name: data_operation_result
    packet: runx.data.operation_result.v1

runners:
  append_event:
    default: true
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Stable logical ref bound by the project or hosted operator to a provider adapter.
      store_id:
        type: string
        required: false
        description: Opt into the bundled data.local fixture store with this deterministic store id; omit for durable local SQLite.
      resource:
        type: string
        required: true
        description: Declared event resource or stream family.
      aggregate_id:
        type: string
        required: true
        description: Event stream or partition key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this data effect.
      event:
        type: json
        required: true
        description: Domain event or transition packet to append.
    graph:
      name: data-store-append-event
      steps:
        - id: append
          tool: data.source
          scopes:
            - runx:data:append
          inputs:
            operation: append_event
            data_source_ref: "$input.data_source_ref"
            store_id: "$input.store_id"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
            event: "$input.event"

  read_events:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Stable logical ref bound by the project or hosted operator to a provider adapter.
      store_id:
        type: string
        required: false
        description: Opt into the bundled data.local fixture store with this deterministic store id; omit for durable local SQLite.
      resource:
        type: string
        required: true
        description: Declared event resource or stream family.
      aggregate_id:
        type: string
        required: true
        description: Event stream or partition key.
      limit:
        type: number
        required: false
        default: 50
        description: Maximum events to return.
    graph:
      name: data-store-read-events
      steps:
        - id: read
          tool: data.source
          scopes:
            - runx:data:read
          inputs:
            operation: read_events
            data_source_ref: "$input.data_source_ref"
            store_id: "$input.store_id"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            limit: "$input.limit"

  read_projection:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Stable logical ref bound by the project or hosted operator to a provider adapter.
      store_id:
        type: string
        required: false
        description: Opt into the bundled data.local fixture store with this deterministic store id; omit for durable local SQLite.
      resource:
        type: string
        required: true
        description: Declared event resource or projection family.
      aggregate_id:
        type: string
        required: true
        description: Event stream or partition key.
    graph:
      name: data-store-read-projection
      steps:
        - id: read
          tool: data.source
          scopes:
            - runx:data:read
          inputs:
            operation: read_projection
            data_source_ref: "$input.data_source_ref"
            store_id: "$input.store_id"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"

  append_and_readback:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Stable logical ref bound by the project or hosted operator to a provider adapter.
      store_id:
        type: string
        required: false
        description: Opt into the bundled data.local fixture store with this deterministic store id; omit for durable local SQLite.
      resource:
        type: string
        required: true
        description: Declared event resource or stream family.
      aggregate_id:
        type: string
        required: true
        description: Event stream or partition key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this data effect.
      event:
        type: json
        required: true
        description: Domain event or transition packet to append.
    graph:
      name: data-store-append-and-readback
      steps:
        - id: append
          tool: data.source
          scopes:
            - runx:data:append
          inputs:
            operation: append_event
            data_source_ref: "$input.data_source_ref"
            store_id: "$input.store_id"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
            event: "$input.event"
        - id: readback
          tool: data.source
          scopes:
            - runx:data:read
          inputs:
            operation: read_projection
            data_source_ref: "$input.data_source_ref"
            store_id: "$input.store_id"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
