<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Basic runx business ops graph</title>
  <desc id="desc">A simple graph showing one business signal entering the runx business-ops skill, fanning out to docs, release, issue-to-PR, send draft, spend quote, and audit lanes, then stopping at approvals or producing receipts.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#6b7280"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #d6dbe5; stroke-width: 1.5; }
      .primary { fill: #fff7fb; stroke: #ff2e88; stroke-width: 1.5; }
      .soft { fill: #f8fafc; stroke: #d6dbe5; stroke-width: 1.5; }
      .text { fill: #111827; font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #4b5563; font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #6b7280; font: 600 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; letter-spacing: 0.04em; }
      .line { fill: none; stroke: #6b7280; stroke-width: 1.5; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #9ca3af; stroke-width: 1.5; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0b0d14; }
        .box { fill: #111827; stroke: #30384a; }
        .primary { fill: #1b1020; stroke: #ff2e88; }
        .soft { fill: #0f1522; stroke: #30384a; }
        .text { fill: #f9fafb; }
        .small { fill: #c6ceda; }
        .label { fill: #9ca3af; }
        .line { stroke: #9ca3af; }
        .bus { stroke: #6b7280; }
      }
    </style>
  </defs>

  <rect class="bg" width="1120" height="360" rx="12"/>

  <text class="label" x="40" y="42">basic operator flow</text>
  <text class="text" x="40" y="68">One business signal becomes a small governed ops graph.</text>

  <rect class="box" x="40" y="142" width="158" height="72" rx="8"/>
  <text class="text" x="66" y="173">signal</text>
  <text class="small" x="66" y="195">launch readiness</text>

  <path class="line" d="M198 178 H278"/>

  <rect class="primary" x="278" y="128" width="180" height="100" rx="8"/>
  <text class="label" x="306" y="160">runx skill</text>
  <text class="text" x="306" y="184">business-ops</text>
  <text class="small" x="306" y="206">classify, route, gate</text>

  <path class="line" d="M458 178 H524"/>
  <path class="bus" d="M524 88 V288"/>

  <path class="line" d="M524 88 H590"/>
  <path class="line" d="M524 128 H590"/>
  <path class="line" d="M524 168 H590"/>
  <path class="line" d="M524 208 H590"/>
  <path class="line" d="M524 248 H590"/>
  <path class="line" d="M524 288 H590"/>

  <rect class="soft" x="590" y="68" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="93">docs from evidence</text>

  <rect class="soft" x="590" y="108" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="133">release checks</text>

  <rect class="soft" x="590" y="148" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="173">issue to PR</text>

  <rect class="soft" x="590" y="188" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="213">send draft</text>

  <rect class="soft" x="590" y="228" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="253">spend quote</text>

  <rect class="soft" x="590" y="268" width="170" height="40" rx="6"/>
  <text class="small" x="614" y="293">receipt audit</text>

  <path class="line" d="M760 88 H842"/>
  <path class="line" d="M760 128 H842"/>
  <path class="line" d="M760 168 H842"/>
  <path class="line" d="M760 208 H842"/>
  <path class="line" d="M760 248 H842"/>
  <path class="line" d="M760 288 H842"/>

  <rect class="box" x="842" y="96" width="216" height="70" rx="8"/>
  <text class="text" x="870" y="126">receipt</text>
  <text class="small" x="870" y="148">what ran, under authority</text>

  <rect class="box" x="842" y="204" width="216" height="70" rx="8"/>
  <text class="text" x="870" y="234">approval gate</text>
  <text class="small" x="870" y="256">send, spend, merge, deploy</text>
</svg>
